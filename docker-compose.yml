version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - CHROMA_PATH=/app/chroma_db
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - rag_network
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:

networks:
  rag_network:
    driver: bridge